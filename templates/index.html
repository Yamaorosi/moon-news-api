<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>News Feed</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f5f8fa;
}

.container {
  max-width: 600px;
  margin: auto;
}

.card {
  background: white;
  border-bottom: 1px solid #e6ecf0;
  padding: 12px 14px;
}

.title {
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

.meta {
  font-size: 12px;
  color: gray;
  margin-top: 4px;
}

.desc {
  display: none;
  margin-top: 8px;
  font-size: 14px;
}

.link {
  color: #1da1f2;
  font-size: 12px;
  display: block;
  margin-top: 6px;
}
</style>
</head>

<body>

<div class="container">
  <h2 style="padding:10px;">📰 News Feed</h2>
  <button onclick="loadNews()">ニュース取得</button>
  <div id="news"></div>
</div>

<script>
async function loadNews() {
  const res = await fetch("/news");
  const data = await res.json();

  const container = document.getElementById("news");
  container.innerHTML = "";

  data.forEach((article, i) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title" onclick="toggle(${i})">
        ${article.title}
      </div>

      <div class="meta">
        ${article.source} · ${new Date(article.publishedAt).toLocaleString()}
      </div>

      <div id="desc-${i}" class="desc">
        ${article.description || "No description"}
        <a class="link" href="${article.url}" target="_blank">元記事へ</a>
      </div>
    `;

    container.appendChild(card);
  });
}

function toggle(i) {
  const el = document.getElementById(`desc-${i}`);
  el.style.display = el.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
