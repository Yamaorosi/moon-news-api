<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>News Feed</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f5f8fa;
}

.container {
  max-width: 600px;
  margin: auto;
}

.card {
  background: white;
  border-bottom: 1px solid #e6ecf0;
  padding: 12px 14px;
}

.title {
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

.meta {
  font-size: 12px;
  color: gray;
  margin-top: 4px;
}

.desc {
  display: none;
  margin-top: 8px;
  font-size: 14px;
}

.link {
  color: #1da1f2;
  font-size: 12px;
  display: block;
  margin-top: 6px;
}
.tabs {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

.tabs button {
  border: none;
  background: #eef3f7;
  padding: 4px 8px;
  border-radius: 12px;
  font-size: 12px;
  cursor: pointer;
}

.tab {
  display: none;
  margin-top: 8px;
  font-size: 14px;
}

</style>
</head>

<body>

<div class="container">
  <h2 style="padding:10px;">📰 News Feed</h2>
  <button onclick="loadNews()">ニュース取得</button>
  <div id="news"></div>
</div>

<script>
async function loadNews() {
  const res = await fetch("/news");
  const data = await res.json();

  const container = document.getElementById("news");
  container.innerHTML = "";

  data.forEach((article, i) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title">${article.title}</div>

      <div class="meta">
        ${article.source} · ${new Date(article.publishedAt).toLocaleString()}
      </div>

      <div class="tabs">
        <button onclick="showTab(${i}, 'body')">本文</button>
        <button onclick="showTab(${i}, 'structure')">構造</button>
        <button onclick="showTab(${i}, 'poem')">詩</button>
      </div>

      <div class="content">
        <div id="body-${i}" class="tab">
          ${article.description || "No description"}
        </div>
        <div id="structure-${i}" class="tab">
          （構造はあとで）
        </div>
        <div id="poem-${i}" class="tab">
          （詩はあとで）
        </div>
      </div>
    `;

    container.appendChild(card);
  });
}

function showTab(index, type) {
  const types = ["body", "structure", "poem"];
  types.forEach(t => {
    const el = document.getElementById(`${t}-${index}`);
    if (el) el.style.display = "none";
  });

  const target = document.getElementById(`${type}-${index}`);
  if (target) target.style.display = "block";
}
</script>

</body>
</html>
